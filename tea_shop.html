<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍之茶飲 · Dragon Sky Tea</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+TC:wght@300;400&display=swap');

  :root {
    --sky-deep: #04101e;
    --sky-mid: #0b2348;
    --sky-blue: #1565a0;
    --sky-light: #38b0e0;
    --sky-pale: #9dd8f5;
    --sky-glow: #d0f0ff;
    --gold: #c9952e;
    --gold-light: #f0cc7a;
    --white: #f2ede4;
    --accent: #5ecfff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--sky-deep);
    color: var(--white);
    font-family: 'Noto Sans TC', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── SKY BG ── */
  .sky-bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 60% 30%, #102a58 0%, #04101e 70%);
    overflow: hidden;
  }
  .aurora {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.18;
    animation: auroraPulse ease-in-out infinite;
  }
  .aurora-1 { width:600px;height:300px;background:#1a7bce;top:5%;left:10%;animation-duration:12s; }
  .aurora-2 { width:400px;height:200px;background:#0e4a8f;top:40%;right:5%;animation-duration:16s;animation-delay:-5s; }
  .aurora-3 { width:500px;height:150px;background:#38b0e0;bottom:10%;left:20%;animation-duration:10s;animation-delay:-3s; }
  @keyframes auroraPulse {
    0%,100% { opacity:.12; transform:scale(1); }
    50%      { opacity:.26; transform:scale(1.1); }
  }
  .star { position:absolute;background:white;border-radius:50%;animation:twinkle ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.08;}50%{opacity:1;} }

  /* ── DRAGON ── */
  .dragon-scene {
    position:relative;z-index:5;
    width:100%;max-width:900px;
    margin:0 auto;
    display:flex;justify-content:center;
    padding-top:28px;
  }
  .dragon-svg-wrap {
    width:min(340px,78vw);
    animation:dragonSoar 9s ease-in-out infinite;
    filter:drop-shadow(0 0 28px rgba(56,176,224,.55)) drop-shadow(0 0 70px rgba(56,176,224,.2));
  }
  @keyframes dragonSoar {
    0%,100%{transform:translateY(0) rotate(-1.5deg) scale(1);}
    50%{transform:translateY(-18px) rotate(1.5deg) scale(1.02);}
  }

  /* ── LAYOUT ── */
  .container { position:relative;z-index:10;max-width:820px;margin:0 auto;padding:0 28px; }

  /* ── HEADER ── */
  .site-header { text-align:center;padding:18px 0 8px; }
  .badge {
    display:inline-block;border:1px solid rgba(56,176,224,.5);
    padding:3px 20px;font-size:10px;letter-spacing:5px;
    color:var(--sky-pale);border-radius:2px;margin-bottom:14px;
  }
  .site-title {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(26px,5.5vw,50px);color:var(--sky-glow);
    letter-spacing:5px;
    text-shadow:0 0 40px rgba(56,176,224,.7),0 0 100px rgba(56,176,224,.3);
    animation:titleGlow 5s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%,100%{text-shadow:0 0 40px rgba(56,176,224,.7),0 0 100px rgba(56,176,224,.3);}
    50%{text-shadow:0 0 70px rgba(56,176,224,1),0 0 140px rgba(56,176,224,.5);}
  }
  .site-sub { font-family:'Noto Serif TC',serif;font-size:22px;color:var(--gold-light);letter-spacing:10px;margin-top:6px; }
  .divider { margin:18px auto;width:220px;height:1px;background:linear-gradient(90deg,transparent,var(--sky-light),var(--gold),var(--sky-light),transparent); }

  /* ── CARD ── */
  .card {
    background:linear-gradient(145deg,rgba(11,35,72,.88),rgba(4,16,30,.95));
    border:1px solid rgba(56,176,224,.22);border-radius:10px;
    padding:38px;margin:28px 0;backdrop-filter:blur(24px);
    box-shadow:0 0 60px rgba(14,74,143,.18),inset 0 1px 0 rgba(255,255,255,.04);
    position:relative;overflow:hidden;
  }
  .card::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--sky-light),var(--gold),var(--sky-light),transparent); }
  .card-title { font-family:'Noto Serif TC',serif;font-size:16px;color:var(--sky-pale);letter-spacing:5px;margin-bottom:30px;display:flex;align-items:center;gap:14px; }
  .card-title::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(56,176,224,.35));}
  .card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(56,176,224,.35),transparent);}

  .form-grid { display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:26px; }
  .field { display:flex;flex-direction:column;gap:8px; }
  label { font-size:10px;letter-spacing:4px;color:var(--sky-pale);text-transform:uppercase; }
  input[type="number"] {
    background:rgba(4,16,30,.75);border:1px solid rgba(56,176,224,.28);
    border-radius:5px;color:var(--white);font-family:'Noto Sans TC',sans-serif;
    font-size:22px;padding:11px 15px;transition:border-color .3s,box-shadow .3s;width:100%;
  }
  input[type="number"]:focus { outline:none;border-color:var(--sky-light);box-shadow:0 0 18px rgba(56,176,224,.25); }

  .toggle-group { display:flex;border:1px solid rgba(56,176,224,.28);border-radius:5px;overflow:hidden; }
  .toggle-btn { flex:1;background:transparent;border:none;color:var(--sky-pale);font-family:'Noto Serif TC',serif;font-size:15px;letter-spacing:2px;padding:12px;cursor:pointer;transition:background .3s,color .3s; }
  .toggle-btn.active { background:linear-gradient(135deg,var(--sky-blue),var(--sky-mid));color:var(--white); }
  .toggle-btn:not(.active):hover { background:rgba(56,176,224,.1); }

  .calc-btn { width:100%;padding:15px;background:linear-gradient(135deg,#0f5fa0,#0a2a5e 50%,#0b3070);border:1px solid var(--sky-light);border-radius:5px;color:var(--white);font-family:'Noto Serif TC',serif;font-size:16px;letter-spacing:7px;cursor:pointer;transition:box-shadow .3s,transform .1s; }
  .calc-btn:hover { box-shadow:0 0 28px rgba(56,176,224,.5); }
  .calc-btn:active { transform:scale(.99); }

  .result-area { margin-top:28px;padding:26px;background:rgba(4,16,30,.65);border:1px solid rgba(201,149,46,.35);border-radius:8px;text-align:center;display:none;animation:fadeUp .5s ease; }
  .result-area.show { display:block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
  .result-label { font-size:10px;letter-spacing:5px;color:var(--sky-pale);margin-bottom:6px;text-transform:uppercase; }
  .result-price { font-family:'Cinzel Decorative',serif;font-size:58px;color:var(--gold-light);text-shadow:0 0 30px rgba(201,149,46,.5); }
  .result-price span { font-size:20px;color:var(--gold);margin-right:3px; }
  .tags { margin-top:14px;display:flex;justify-content:center;flex-wrap:wrap;gap:8px; }
  .tag { background:rgba(56,176,224,.12);border:1px solid rgba(56,176,224,.35);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--sky-pale);letter-spacing:1px; }

  .rules { display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:50px; }
  .rule-card { background:rgba(11,35,72,.45);border:1px solid rgba(56,176,224,.13);border-radius:8px;padding:18px 22px; }
  .rule-icon { font-size:22px;margin-bottom:8px; }
  .rule-title { font-family:'Noto Serif TC',serif;font-size:14px;color:var(--sky-pale);letter-spacing:2px;margin-bottom:6px; }
  .rule-desc { font-size:12px;color:rgba(242,237,228,.5);line-height:1.9; }

  footer { position:relative;z-index:10;text-align:center;padding:20px 0 44px;font-size:10px;color:rgba(157,216,245,.3);letter-spacing:4px; }

  @media(max-width:580px){
    .form-grid{grid-template-columns:1fr;}
    .rules{grid-template-columns:1fr;}
    .card{padding:22px;}
  }
</style>
</head>
<body>

<div class="sky-bg">
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>
</div>

<script>
(function(){
  const sky=document.querySelector('.sky-bg');
  for(let i=0;i<90;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.2+0.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*65}%;animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*5}s`;
    sky.appendChild(s);
  }
})();
</script>

<!-- CONTENT -->
<div class="container">
  <div class="site-header">
    <div class="badge">Dragon Sky Tea · 龍之茶飲</div>
    <div class="site-title">Dragon Sky</div>
    <div class="site-sub">龍之茶飲</div>
    <div class="divider"></div>
  </div>

  <div class="card">
    <div class="card-title">折扣計算器</div>
    <div class="form-grid">
      <div class="field">
        <label>原價（元）</label>
        <input type="number" id="price" value="50" min="20" max="100">
      </div>
      <div class="field">
        <label>氣溫（°C）</label>
        <input type="number" id="temp" value="30" min="-40" max="50">
      </div>
      <div class="field">
        <label>時段（24小時制）</label>
        <input type="number" id="hour" value="8" min="0" max="23">
      </div>
      <div class="field">
        <label>飲品類型</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="btn-cold" onclick="selectType(0)">❄ 冷飲</button>
          <button class="toggle-btn" id="btn-hot"  onclick="selectType(1)">☕ 熱飲</button>
        </div>
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">計 算 折 扣</button>
    <div class="result-area" id="result">
      <div class="result-label">折扣後價格</div>
      <div class="result-price"><span>$</span><span id="final-price">—</span></div>
      <div class="tags" id="tags"></div>
    </div>
  </div>

  <div class="rules">
    <div class="rule-card">
      <div class="rule-icon">🌡️</div>

<script>
let drinkType=0;
function selectType(t){
  drinkType=t;
  document.getElementById('btn-cold').classList.toggle('active',t===0);
  document.getElementById('btn-hot').classList.toggle('active',t===1);
}
function calculate(){
  const P=parseInt(document.getElementById('price').value);
  const D=parseInt(document.getElementById('temp').value);
  const T=parseInt(document.getElementById('hour').value);
  if(isNaN(P)||isNaN(D)||isNaN(T)){alert('請填入所有欄位！');return;}
  let discount=0;const tags=[];
  if(D>=30&&drinkType===0){discount+=5;tags.push('🌡️ 高溫冷飲 -5元');}
  if(D<=15&&drinkType===1){discount+=5;tags.push('❄️ 低溫熱飲 -5元');}
  if((T>=7&&T<10)||(T>=14&&T<16)){discount+=5;tags.push((T>=7&&T<10)?'🌅 早餐優惠 -5元':'☕ 下午茶優惠 -5元');}
  const final=P-discount;
  document.getElementById('final-price').textContent=final;
  const tagsEl=document.getElementById('tags');
  tagsEl.innerHTML=tags.length?tags.map(t=>`<span class="tag">${t}</span>`).join(''):'<span class="tag">無適用優惠</span>';
  const r=document.getElementById('result');
  r.classList.remove('show');void r.offsetWidth;r.classList.add('show');
}
calculate();
</script>
